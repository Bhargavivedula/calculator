<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Advanced Calculator</title>

 <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="ad-box" id="dragBox">

    <!-- THEME -->

    <button class="theme-btn"
      onclick="toggleTheme()">

      🌙

    </button>

    <!-- TITLE -->

    <div class="title">

      CALCU PRO

    </div>

    <div class="subtitle">

      Advanced Smart Calculator

    </div>

    <!-- CLOCK -->

    <div id="clock"></div>

    <!-- CALCULATOR -->

    <div class="calculator">

      <!-- SCREEN -->

      <div class="screen" id="screen">

        0

      </div>

      <!-- SCIENTIFIC BUTTONS -->

      <div class="scientific-buttons">

        <button
          onclick="appendValue('Math.sin(')">
          sin
        </button>

        <button
          onclick="appendValue('Math.cos(')">
          cos
        </button>

        <button
          onclick="appendValue('Math.tan(')">
          tan
        </button>

        <button
          onclick="appendValue('Math.sqrt(')">
          √
        </button>

      </div>

      <!-- MAIN BUTTONS -->

      <div class="buttons">

        <button class="clear"
          onclick="clearScreen()">
          C
        </button>

        <button
          onclick="appendValue('%')">
          %
        </button>

        <button
          onclick="appendValue('/')">
          ÷
        </button>

        <button class="operator"
          onclick="appendValue('*')">
          ×
        </button>

        <button onclick="appendValue('7')">
          7
        </button>

        <button onclick="appendValue('8')">
          8
        </button>

        <button onclick="appendValue('9')">
          9
        </button>

        <button class="operator"
          onclick="appendValue('-')">
          -
        </button>

        <button onclick="appendValue('4')">
          4
        </button>

        <button onclick="appendValue('5')">
          5
        </button>

        <button onclick="appendValue('6')">
          6
        </button>

        <button class="operator"
          onclick="appendValue('+')">
          +
        </button>

        <button onclick="appendValue('1')">
          1
        </button>

        <button onclick="appendValue('2')">
          2
        </button>

        <button onclick="appendValue('3')">
          3
        </button>

        <button class="equal"
          onclick="calculate()">
          =
        </button>

        <button onclick="appendValue('0')">
          0
        </button>

        <button onclick="appendValue('.')">
          .
        </button>

        <button onclick="backspace()">
          ⌫
        </button>

      </div>

    </div>

    <!-- AI ASSISTANT -->

    <div class="section">

      <h3>AI Assistant</h3>

      <input
        type="text"
        id="aiInput"
        placeholder="Ask AI...">

      <button onclick="aiReply()">
        Ask AI
      </button>

      <p id="aiResponse"></p>

    </div>

    <!-- CURRENCY -->

    <div class="section">

      <h3>Currency Converter</h3>

      <input
        type="number"
        id="rupees"
        placeholder="Enter INR">

      <button onclick="convertCurrency()">
        Convert to USD
      </button>

      <h3 id="usdResult"></h3>

    </div>

    <!-- UNIT -->

    <div class="section">

      <h3>Unit Converter</h3>

      <input
        type="number"
        id="cmInput"
        placeholder="Centimeters">

      <button onclick="convertCM()">
        Convert to Meters
      </button>

      <h3 id="meterResult"></h3>

    </div>

    <!-- THEMES -->

    <div class="section">

      <h3>Calculator Themes</h3>

      <select onchange="changeTheme(this.value)">

        <option value="#1e1e2f">
          Dark
        </option>

        <option value="#001f3f">
          Blue
        </option>

        <option value="#4b0082">
          Purple
        </option>

        <option value="#064420">
          Green
        </option>

      </select>

    </div>

    <!-- HISTORY -->

    <div class="history-panel">

      <h3>History</h3>

      <ul id="historyList"></ul>

    </div>

  </div>

<script src="script.js"></script>

</body>

</html>
