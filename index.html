<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Advanced Calculator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#1e1e2f;
      overflow:auto;
      transition:0.4s;
      color:white;
      position:relative;
    }

    /* PARTICLES */

    body::before{
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background-image:
      radial-gradient(
        white 1px,
        transparent 1px
      );

      background-size:40px 40px;

      opacity:0.08;

      animation:moveParticles 10s linear infinite;

      z-index:-1;
    }

    @keyframes moveParticles{

      from{
        transform:translateY(0);
      }

      to{
        transform:translateY(-100px);
      }

    }

    /* LIGHT MODE */

    body.light-mode{
      background:#f4f4f4;
      color:black;
    }

    body.light-mode .ad-box{
      background:white;
      color:black;
    }

    body.light-mode .calculator{
      background:#ddd;
    }

    body.light-mode .screen{
      background:white;
      color:black;
    }

    body.light-mode button{
      color:black;
    }

    /* MAIN BOX */

    .ad-box{
      width:420px;
      padding:25px;
      border-radius:25px;
      background:#2b2b40;
      box-shadow:
      0 10px 30px rgba(0,0,0,0.4);

      position:relative;
      cursor:move;
    }

    /* TITLE */

    .title{
      text-align:center;
      font-size:38px;
      font-weight:bold;
      color:#00ffd5;
      margin-bottom:10px;

      animation:float 3s infinite;
    }

    @keyframes float{

      0%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-8px);
      }

      100%{
        transform:translateY(0);
      }

    }

    .subtitle{
      text-align:center;
      margin-bottom:20px;
      color:#ccc;
    }

    /* CLOCK */

    #clock{
      text-align:center;
      font-size:20px;
      margin-bottom:15px;
      color:#00ffd5;
      font-weight:bold;
    }

    /* CALCULATOR */

    .calculator{
      background:#111;
      padding:20px;
      border-radius:20px;
    }

    /* SCREEN */

    .screen{
      height:70px;
      background:#222;
      border-radius:10px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:15px;
      font-size:30px;
      color:#00ffcc;
      margin-bottom:15px;
      overflow:auto;
    }

    /* BUTTONS */

    .buttons,
    .scientific-buttons{

      display:grid;
      grid-template-columns:repeat(4,1fr);

      gap:10px;

      margin-bottom:10px;
    }

    button{

      height:55px;

      border:none;

      border-radius:12px;

      cursor:pointer;

      font-size:18px;

      font-weight:bold;

      background:#444;

      color:white;

      transition:0.2s;

      box-shadow:
      0 5px #222,
      0 10px 20px rgba(0,0,0,0.3);

    }

    button:hover{

      transform:scale(1.05);

      box-shadow:0 0 12px #00ffd5;

    }

    button:active{

      transform:translateY(4px);

      box-shadow:0 2px #222;

    }

    .operator{
      background:#ff9500;
    }

    .clear{
      background:#ff1744;
    }

    .equal{

      background:linear-gradient(
      45deg,
      red,
      orange,
      yellow,
      green,
      blue,
      indigo,
      violet
      );

    }

    /* HISTORY */

    .history-panel{

      margin-top:20px;

      background:#111;

      padding:15px;

      border-radius:15px;

      max-height:150px;

      overflow-y:auto;

    }

    .history-panel h3{

      color:#00ffd5;

      margin-bottom:10px;

    }

    .history-panel li{

      list-style:none;

      padding:5px;

      border-bottom:1px solid #333;

    }

    /* INPUTS */

    input,
    select{

      width:100%;

      padding:12px;

      margin-top:10px;

      border:none;

      border-radius:10px;

      outline:none;

      font-size:16px;

    }

    .section{
      margin-top:20px;
    }

    h3{
      margin-bottom:10px;
      color:#00ffd5;
    }

    /* THEME BUTTON */

    .theme-btn{

      position:absolute;

      top:15px;

      right:15px;

      width:45px;

      height:45px;

      border-radius:50%;

      background:#00ffd5;

      font-size:20px;

    }

  </style>

</head>

<body>

  <div class="ad-box" id="dragBox">

    <!-- THEME -->

    <button class="theme-btn"
      onclick="toggleTheme()">

      🌙

    </button>

    <!-- TITLE -->

    <div class="title">

      CALCU PRO

    </div>

    <div class="subtitle">

      Advanced Smart Calculator

    </div>

    <!-- CLOCK -->

    <div id="clock"></div>

    <!-- CALCULATOR -->

    <div class="calculator">

      <!-- SCREEN -->

      <div class="screen" id="screen">

        0

      </div>

      <!-- SCIENTIFIC BUTTONS -->

      <div class="scientific-buttons">

        <button
          onclick="appendValue('Math.sin(')">
          sin
        </button>

        <button
          onclick="appendValue('Math.cos(')">
          cos
        </button>

        <button
          onclick="appendValue('Math.tan(')">
          tan
        </button>

        <button
          onclick="appendValue('Math.sqrt(')">
          √
        </button>

      </div>

      <!-- MAIN BUTTONS -->

      <div class="buttons">

        <button class="clear"
          onclick="clearScreen()">
          C
        </button>

        <button
          onclick="appendValue('%')">
          %
        </button>

        <button
          onclick="appendValue('/')">
          ÷
        </button>

        <button class="operator"
          onclick="appendValue('*')">
          ×
        </button>

        <button onclick="appendValue('7')">
          7
        </button>

        <button onclick="appendValue('8')">
          8
        </button>

        <button onclick="appendValue('9')">
          9
        </button>

        <button class="operator"
          onclick="appendValue('-')">
          -
        </button>

        <button onclick="appendValue('4')">
          4
        </button>

        <button onclick="appendValue('5')">
          5
        </button>

        <button onclick="appendValue('6')">
          6
        </button>

        <button class="operator"
          onclick="appendValue('+')">
          +
        </button>

        <button onclick="appendValue('1')">
          1
        </button>

        <button onclick="appendValue('2')">
          2
        </button>

        <button onclick="appendValue('3')">
          3
        </button>

        <button class="equal"
          onclick="calculate()">
          =
        </button>

        <button onclick="appendValue('0')">
          0
        </button>

        <button onclick="appendValue('.')">
          .
        </button>

        <button onclick="backspace()">
          ⌫
        </button>

      </div>

    </div>

    <!-- AI ASSISTANT -->

    <div class="section">

      <h3>AI Assistant</h3>

      <input
        type="text"
        id="aiInput"
        placeholder="Ask AI...">

      <button onclick="aiReply()">
        Ask AI
      </button>

      <p id="aiResponse"></p>

    </div>

    <!-- CURRENCY -->

    <div class="section">

      <h3>Currency Converter</h3>

      <input
        type="number"
        id="rupees"
        placeholder="Enter INR">

      <button onclick="convertCurrency()">
        Convert to USD
      </button>

      <h3 id="usdResult"></h3>

    </div>

    <!-- UNIT -->

    <div class="section">

      <h3>Unit Converter</h3>

      <input
        type="number"
        id="cmInput"
        placeholder="Centimeters">

      <button onclick="convertCM()">
        Convert to Meters
      </button>

      <h3 id="meterResult"></h3>

    </div>

    <!-- THEMES -->

    <div class="section">

      <h3>Calculator Themes</h3>

      <select onchange="changeTheme(this.value)">

        <option value="#1e1e2f">
          Dark
        </option>

        <option value="#001f3f">
          Blue
        </option>

        <option value="#4b0082">
          Purple
        </option>

        <option value="#064420">
          Green
        </option>

      </select>

    </div>

    <!-- HISTORY -->

    <div class="history-panel">

      <h3>History</h3>

      <ul id="historyList"></ul>

    </div>

  </div>

  <script>

    let screen =
      document.getElementById("screen");

    // APPEND VALUE

    function appendValue(value){

      if(screen.innerText === "0"){

        screen.innerText = value;

      }

      else{

        screen.innerText += value;

      }

    }

    // CLEAR SCREEN

    function clearScreen(){

      screen.innerText = "0";

    }

    // CALCULATE

    function calculate(){

      try{

        let expression =
          screen.innerText;

        let result =
          eval(expression);

        screen.innerText =
          result;

        addToHistory(
          expression,
          result
        );

      }

      catch{

        screen.innerText =
          "Error";

      }

    }

    // BACKSPACE

    function backspace(){

      screen.innerText =
        screen.innerText.slice(0,-1);

      if(screen.innerText === ""){

        screen.innerText = "0";

      }

    }

    // HISTORY

    function addToHistory(
      expression,
      result
    ){

      let historyList =
        document.getElementById(
          "historyList"
        );

      let li =
        document.createElement("li");

      li.innerText =
        expression + " = " + result;

      historyList.prepend(li);

    }

    // THEME TOGGLE

    function toggleTheme(){

      document.body.classList.toggle(
        "light-mode"
      );

    }

    // KEYBOARD SUPPORT

    document.addEventListener(
      "keydown",
      function(e){

      if(
        !isNaN(e.key) ||
        "+-*/.%".includes(e.key)
      ){

        appendValue(e.key);

      }

      if(e.key === "Enter"){

        calculate();

      }

      if(e.key === "Backspace"){

        backspace();

      }

      if(e.key === "Escape"){

        clearScreen();

      }

    });

    // DIGITAL CLOCK

    function updateClock(){

      let now =
        new Date();

      let time =
        now.toLocaleTimeString();

      document.getElementById(
        "clock"
      ).innerText = time;

    }

    setInterval(updateClock,1000);

    updateClock();

    // AI ASSISTANT

    function aiReply(){

      let input =
        document
        .getElementById("aiInput")
        .value
        .toLowerCase();

      let response =
        document.getElementById(
          "aiResponse"
        );

      if(input.includes("hello")){

        response.innerText =
          "Hello 👋";

      }

      else if(
        input.includes("creator")
      ){

        response.innerText =
          "Created by Frontend Expert 🚀";

      }

      else{

        response.innerText =
          "I am Calculator AI 🤖";

      }

    }

    // CURRENCY CONVERTER

    function convertCurrency(){

      let inr =
        document.getElementById(
          "rupees"
        ).value;

      let usd = inr / 83;

      document.getElementById(
        "usdResult"
      ).innerText =
        "$ " + usd.toFixed(2);

    }

    // UNIT CONVERTER

    function convertCM(){

      let cm =
        document.getElementById(
          "cmInput"
        ).value;

      let meter = cm / 100;

      document.getElementById(
        "meterResult"
      ).innerText =
        meter + " meters";

    }

    // CHANGE THEME

    function changeTheme(color){

      document.body.style.background =
        color;

    }

    // DRAGGABLE CALCULATOR

    let calc =
      document.getElementById(
        "dragBox"
      );

    let isDragging = false;

    let offsetX,
        offsetY;

    calc.addEventListener(
      "mousedown",
      function(e){

      isDragging = true;

      offsetX =
        e.clientX - calc.offsetLeft;

      offsetY =
        e.clientY - calc.offsetTop;

    });

    document.addEventListener(
      "mousemove",
      function(e){

      if(isDragging){

        calc.style.position =
          "absolute";

        calc.style.left =
          (e.clientX - offsetX)
          + "px";

        calc.style.top =
          (e.clientY - offsetY)
          + "px";

      }

    });

    document.addEventListener(
      "mouseup",
      function(){

      isDragging = false;

    });

  </script>

</body>

</html>
